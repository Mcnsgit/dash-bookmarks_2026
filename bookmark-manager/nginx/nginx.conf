# Reverse proxy that lives in the Tailscale network namespace.
# Listens on port 80 of the Tailscale machine (only reachable on the tailnet).

user nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  client_max_body_size 50m;

  # Because we use network_mode: service:tailscale, all containers are reachable
  # via their names on the bookmark-net bridge (frontend, backend, screenshot).
  # However, sidecar pattern: nginx "sees" the same network as tailscale.
  # tailscale itself is attached to bookmark-net, so DNS for the other containers
  # is available through that bridge.

  upstream backend_upstream  { server backend:4000;  }
  upstream frontend_upstream { server frontend:80;   }

  server {
    listen 80 default_server;
    server_name _;

    # --- API ---------------------------------------------------------------
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # WebSocket
    location /api/ws {
      proxy_pass http://backend_upstream/api/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
    }

    # Screenshots served from the shared volume.
    location /screenshots/ {
      alias /screenshots/;
      access_log off;
      expires 1d;
      add_header Cache-Control "public";
    }

    # --- Frontend ----------------------------------------------------------
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
