# docker-compose.yml

name: bookmark-manager

networks:
  bookmark-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  screenshots:

services:
  postgres:
    image: postgres:16-alpine
    container_name: bm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - bookmark-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookmarkuser} -d ${POSTGRES_DB:-bookmarks}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: bm-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - bookmark-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 128m

  screenshot:
    build: ./screenshot
    container_name: bm-screenshot
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - screenshots:/screenshots
    restart: unless-stopped
    networks:
      - bookmark-net
    mem_limit: 1g
    shm_size: 1g

  backend:
    build: ./backend
    container_name: bm-backend
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-bookmarkuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bookmarks}
      - REDIS_URL=redis://redis:6379
      - SCREENSHOT_SERVICE_URL=http://screenshot:5000
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - screenshots:/screenshots
    restart: unless-stopped
    networks:
      - bookmark-net
    mem_limit: 512m

  frontend:
    build: ./frontend
    container_name: bm-frontend
    restart: unless-stopped
    networks:
      - bookmark-net
    mem_limit: 128m

  nginx:
    build: ./nginx
    container_name: bm-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - screenshots:/screenshots:ro
    networks:
      - bookmark-net
    restart: unless-stopped
